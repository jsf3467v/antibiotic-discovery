name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      # F = pyflakes (unused imports, undefined names — real bugs)
      # E = pycodestyle errors; E501 (line length) ignored as noise.
      - name: Lint
        run: ruff check --select E,F --ignore E501 .

      - name: Format check
        run: ruff format --check .

  build:
    name: Build (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install the CPU build of torch first so the runner doesn't pull the
      # multi-GB CUDA wheels. requirements.txt then sees torch>=2.0.0 already
      # satisfied and installs the rest from PyPI.
      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Byte-compile everything: catches syntax errors across all Python
      # versions without needing the gitignored datasets or GPU.
      - name: Byte-compile sources
        run: python -m compileall src config.py

      # Runs the test suite if/when one exists; passes quietly until then.
      - name: Run tests (if any)
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null; then
            pip install pytest
            pytest -q
          else
            echo "No tests found — skipping."
          fi
